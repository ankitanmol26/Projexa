<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Projexa — Build. Showcase. Get Hired.</title>
    <meta name="description" content="The professional platform where student developers publish portfolio projects, connect with peers, and get discovered by recruiters." />
    <meta name="theme-color" content="#09090B" />
    <meta property="og:title" content="Projexa — Build. Showcase. Get Hired." />
    <meta property="og:description" content="Share your work. Connect with developers. Get discovered by recruiters." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Theme init: prevent flash -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('projexa_theme');
          if (t === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch(e) { document.documentElement.classList.add('dark'); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
