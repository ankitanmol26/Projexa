<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <defs>
    <linearGradient id="p-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="p-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main stylized P element -->
  <path d="M 28,15 
           H 58 
           C 78,15 78,45 58,45 
           H 44 
           V 85 
           H 28 
           Z" 
        fill="url(#p-gradient)" />
  <path d="M 44,28 
           H 54 
           C 65,28 65,32 54,32 
           H 44 
           Z" 
        fill="#ffffff" 
        opacity="0.9" />
  <!-- Accent dot inside/near P to represent 'Nexus' -->
  <circle cx="58" cy="45" r="7" fill="#06B6D4" filter="url(#p-glow)" opacity="0.8" />
  <circle cx="58" cy="45" r="4" fill="#ffffff" />
</svg>
